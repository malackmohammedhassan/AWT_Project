<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LWPD Live App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <header class="topbar">
        <h1>LWPD Live</h1>
        <p>Live dataset upload, training, evaluation, prediction, and logs</p>
    </header>

    <main class="layout">
        <section class="card">
            <h2>Dataset Upload</h2>
            <form id="uploadForm">
                <input type="file" id="datasetFile" accept=".csv" required />
                <button type="submit">Upload CSV</button>
            </form>
            <pre id="datasetSummary" class="mono">No dataset uploaded yet.</pre>
        </section>

        <section class="card">
            <h2>Training</h2>
            <div class="row">
                <button id="trainUploaded">Train With Uploaded Dataset</button>
                <button id="trainPrimary">Train With Primary Dataset</button>
            </div>
            <p id="trainingStatus">Status: idle</p>
        </section>

        <section class="card">
            <h2>Prediction</h2>
            <form id="predictForm">
                <input type="text" id="predictUrl" placeholder="Enter URL for prediction" required />
                <button type="submit">Predict</button>
            </form>
            <pre id="predictOutput" class="mono">No predictions yet.</pre>
        </section>

        <section class="card full">
            <h2>Metrics</h2>
            <div id="metricsTableWrap">Run training to view metrics.</div>
        </section>

        <section class="card full">
            <h2>Charts</h2>
            <div class="chart-grid">
                <canvas id="accuracyChart"></canvas>
                <canvas id="prChart"></canvas>
            </div>
        </section>

        <section class="card full">
            <h2>Confusion Matrices</h2>
            <div id="cmGrid" class="cm-grid">Run training to load confusion matrices.</div>
        </section>

        <section class="card full">
            <h2>Live Logs</h2>
            <div id="logs" class="logs"></div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>

</html>
